{{define "content"}}
<div class="container-fluid p-4">
    <div class="row mb-4">
        <div class="col">
            <h2><i class="fas fa-chart-bar"></i> OSWatcher 数据分析和图表展示系统</h2>
            <p class="text-muted">上传 OSWatcher tar 归档文件，自动解析并生成交互式图表</p>
        </div>
    </div>

    <!-- Upload Zone -->
    <div class="row mb-4">
        <div class="col-lg-8">
            <div class="card upload-card">
                <div class="card-body">
                    <div id="uploadZone" class="upload-zone">
                        <div class="upload-icon">
                            <i class="fas fa-cloud-upload-alt fa-3x"></i>
                        </div>
                        <h5>拖放 OSWatcher 归档文件到此处</h5>
                        <p class="text-muted">支持 .tar, .tar.gz, .tgz 格式</p>
                        <input type="file" id="fileInput" accept=".tar,.tar.gz,.tgz" style="display:none">
                        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-folder-open"></i> 选择文件
                        </button>
                    </div>
                    <div id="uploadProgress" style="display:none;">
                        <div class="progress mb-2">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%">0%</div>
                        </div>
                        <p id="uploadStatus" class="text-muted mb-0">准备上传...</p>
                    </div>
                    <div id="uploadResult" style="display:none;"></div>
                </div>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="col-lg-4">
            <div class="card stats-card">
                <div class="card-header">
                    <i class="fas fa-database"></i> 数据统计
                </div>
                <div class="card-body" id="statsBody">
                    <div class="text-center text-muted">
                        <i class="fas fa-inbox fa-2x mb-2"></i>
                        <p>暂无数据</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data Tables -->
    <div class="row" id="dataTables" style="display:none;">
        <div class="col">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-table"></i> 已导入数据
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover table-sm">
                            <thead>
                                <tr>
                                    <th>数据类型</th>
                                    <th>表名</th>
                                    <th>记录数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/js/upload.js"></script>
{{end}}
